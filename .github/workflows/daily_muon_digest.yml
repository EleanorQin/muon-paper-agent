name: Daily Muon Paper Digest

on:
  schedule:
    - cron: "0 9 * * *"
      timezone: "America/Los_Angeles"
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: muon-paper-agent

      - name: Run daily digest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python main.py
        working-directory: muon-paper-agent

      - name: Commit updated seen papers
        run: |
          git config --global user.name "muon-paper-agent"
          git config --global user.email "muon-paper-agent@users.noreply.github.com"
          git add muon-paper-agent/data/seen_papers.json muon-paper-agent/data/daily_digest.md muon-paper-agent/data/archive
          git commit -m "Update daily Muon digest state" || echo "No changes to commit"
          git pull --rebase origin main || echo "Nothing to rebase"
          git push
