lookback_hours: 96
max_results_per_query: 50
fetch_mode: per_keyword
keywords:
  - Muon
  - orthogonalized optimizer
  - orthogonalized gradient
  - Newton-Schulz
  - matrix sign iteration
  - spectral norm optimizer
  - Shampoo optimizer
  - matrix preconditioning
  - low-rank optimizer
  - transformer training
  - large language model optimization
  - LLM optimizer stability
  - logit clipping
  - QK clip
source_filters:
  allowed_category_prefixes:
    - cs.AI
    - cs.CL
    - cs.LG
    - cs.LT
    - cs.NE
    - stat.ML
    - eess.
  blocked_category_prefixes:
    - astro-ph
    - cond-mat
    - gr-qc
    - hep-
    - nucl-
    - physics
    - quant-ph
ranking:
  category_thresholds:
    must_read: 10.0
    skim: 6.0
  signal_weights:
    direct_muon_match: 6.0
    optimizer_match: 2.0
    orthogonalization_match: 3.0
    spectral_norm_match: 2.5
    llm_training_stability_match: 2.0
    bilevel_relevance_match: 1.5
    second_order_match: 2.0
    low_rank_geometry_match: 1.5
    recency: 2.0
    citation_bonus: 1.0
    particle_physics_penalty: 10.0
    generic_math_optimization_penalty: 6.0
digest:
  max_papers: 10
  highlighted_papers: 3
  weak_match_threshold: 4.0
  summary_model: gpt-4.1-mini
notification:
  subject_prefix: "Daily Muon Paper Digest"
state:
  resend_if_score_improves_by: 3.0
